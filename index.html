<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Copa do Mundo 2026</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#050816;
    color:white;
    overflow-x:hidden;
}

/* LOADING */

#loading{
    position:fixed;
    width:100%;
    height:100vh;
    background:#000814;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

#loading h1{
    color:#00ffff;
    font-size:50px;
    margin-bottom:30px;
    text-shadow:
    0 0 10px #00ffff,
    0 0 20px #00ffff,
    0 0 40px #00ffff;
}

.loader{
    width:120px;
    height:120px;
    border:10px solid #111;
    border-top:10px solid #00ffff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

/* HEADER */

header{
    background:#081229;
    padding:20px;
    text-align:center;
    position:sticky;
    top:0;
    z-index:100;
    box-shadow:0 0 20px #00ffff;
}

header h1{
    font-size:40px;
    color:#00ffff;
    text-shadow:
    0 0 10px #00ffff,
    0 0 20px #00ffff;
}

/* SEARCH */

.search-box{
    text-align:center;
    margin:30px;
}

.search-box input{
    width:80%;
    max-width:500px;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#111827;
    color:white;
    font-size:18px;
    outline:none;
    box-shadow:0 0 20px #00ffff;
}

/* GRID */

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
    padding:30px;
}

/* CARD */

.card{
    background:#0f172a;
    border-radius:20px;
    padding:20px;
    transition:0.4s;
    box-shadow:0 0 20px rgba(0,255,255,0.3);
    animation:fade 1s ease;
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
    box-shadow:0 0 40px #00ffff;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.card img{
    width:100%;
    border-radius:15px;
    height:200px;
    object-fit:cover;
}

.card h2{
    margin-top:15px;
    color:#00ffff;
}

.group{
    margin:10px 0;
    color:#ccc;
}

.players{
    margin-top:15px;
}

.player{
    background:#111827;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
}

/* BUTTON */

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#00ffff;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* TABLE */

table{
    width:90%;
    margin:40px auto;
    border-collapse:collapse;
    background:#0f172a;
    border-radius:20px;
    overflow:hidden;
}

th,td{
    padding:15px;
    text-align:center;
}

th{
    background:#00ffff;
    color:black;
}

tr:nth-child(even){
    background:#111827;
}

/* STADIUMS */

.stadiums{
    padding:30px;
}

.stadiums h2{
    text-align:center;
    margin-bottom:20px;
    color:#00ffff;
}

.stadium{
    background:#111827;
    margin:10px 0;
    padding:15px;
    border-radius:10px;
}

/* RESPONSIVO */

@media(max-width:768px){

header h1{
    font-size:28px;
}

.card img{
    height:180px;
}

}

</style>
</head>
<body>

<!-- LOADING -->

<div id="loading">

<h1>COPA DO MUNDO</h1>

<div class="loader"></div>

</div>

<!-- SITE -->

<header>
<h1>⚽ COPA DO MUNDO 2026</h1>
</header>

<!-- SEARCH -->

<div class="search-box">

<input
type="text"
id="search"
placeholder="Pesquisar seleção ou jogador..."
>

</div>

<!-- CARDS -->

<div class="container" id="teams"></div>

<!-- TABELA -->

<table>

<tr>
<th>Seleção</th>
<th>Pontos</th>
<th>Gols</th>
</tr>

<tr>
<td>Brasil</td>
<td>6</td>
<td>5</td>
</tr>

<tr>
<td>Argentina</td>
<td>4</td>
<td>3</td>
</tr>

<tr>
<td>França</td>
<td>3</td>
<td>2</td>
</tr>

</table>

<!-- ESTÁDIOS -->

<div class="stadiums">

<h2>🏟️ Estádios</h2>

<div class="stadium">
:contentReference[oaicite:0]{index=0}
</div>

<div class="stadium">
:contentReference[oaicite:1]{index=1}
</div>

<div class="stadium">
:contentReference[oaicite:2]{index=2}
</div>

</div>

<script>

/* LOADING */

setTimeout(()=>{

document.getElementById("loading").style.display="none"

},3000)

/* TIMES */

const teams = [

{
name:"Brasil",
group:"Grupo C",
flag:"https://flagcdn.com/w320/br.png",
image:"https://upload.wikimedia.org/wikipedia/commons/0/05/Vinicius_Junior_2023.jpg",
players:[
"Alisson",
"Marquinhos",
"Rodrygo",
"Vinícius Jr",
"Neymar"
]
},

{
name:"Argentina",
group:"Grupo A",
flag:"https://flagcdn.com/w320/ar.png",
image:"https://upload.wikimedia.org/wikipedia/commons/8/89/Lionel_Messi_20180626.jpg",
players:[
"Messi",
"Di María",
"Lautaro",
"Julián Álvarez"
]
},

{
name:"França",
group:"Grupo D",
flag:"https://flagcdn.com/w320/fr.png",
image:"https://upload.wikimedia.org/wikipedia/commons/a/a8/Kylian_Mbapp%C3%A9_2022.jpg",
players:[
"Mbappé",
"Griezmann",
"Dembélé",
"Tchouaméni"
]
}

]

const container = document.getElementById("teams")

function renderTeams(list){

container.innerHTML=""

list.forEach(team=>{

container.innerHTML += `

<div class="card">

<img src="${team.image}">

<h2>🇺🇳 ${team.name}</h2>

<p class="group">${team.group}</p>

<img src="${team.flag}" style="height:80px; object-fit:cover;">

<div class="players">

${team.players.map(player=>

`<div class="player">⚽ ${player}</div>`

).join("")}

</div>

<button onclick="simulateGame('${team.name}')">
⚽ Simular Jogo
</button>

</div>

`

})

}

renderTeams(teams)

/* PESQUISA */

document.getElementById("search")
.addEventListener("keyup",(e)=>{

const value = e.target.value.toLowerCase()

const filtered = teams.filter(team=>

team.name.toLowerCase().includes(value) ||

team.players.some(player=>
player.toLowerCase().includes(value)
)

)

renderTeams(filtered)

})

/* SIMULADOR */

function simulateGame(team){

const goals1 = Math.floor(Math.random()*5)
const goals2 = Math.floor(Math.random()*5)

alert(
team + " " + goals1 +
" x " +
goals2 + " Seleção Aleatória"
)

}

/* IA SIMPLES */

function predictWinner(team1,team2){

const random = Math.random()

if(random > 0.5){

return team1 + " tem mais chances"

}else{

return team2 + " tem mais chances"

}

}

console.log(
predictWinner("Brasil","Argentina")
)

</script>

</body>
</html>
