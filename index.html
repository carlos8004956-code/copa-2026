<!-- ======================================= -->
<!-- CSS -->
<!-- ======================================= -->

<style>

.team-info{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    margin-top:20px;
}

.team-info h2{
    margin-bottom:15px;
    color:#00b4ff;
}

.lineup{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.player-card{
    background:#0f172a;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

.player-card img{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:10px;
}

</style>
