<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Copa do Mundo 2062</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ========================================= -->
<!-- HEADER -->
<!-- ========================================= -->

<header>

<h1>🏆 COPA DO MUNDO 2062</h1>

<p>Portal Oficial do Torneio</p>

</header>

<!-- ========================================= -->
<!-- MENU -->
<!-- ========================================= -->

<nav>

<a href="#times">Seleções</a>
<a href="#estadios">Estádios</a>

</nav>

<!-- ========================================= -->
<!-- PESQUISA -->
<!-- ========================================= -->

<input type="text" id="search"
placeholder="Pesquisar time, jogador, grupo ou estádio...">

<!-- ========================================= -->
<!-- TIMES -->
<!-- ========================================= -->

<section id="times">

<h2>🌍 Seleções</h2>

<div class="container" id="teams"></div>

</section>

<!-- ========================================= -->
<!-- ÁREA DA SELEÇÃO -->
<!-- ========================================= -->

<section id="seleção">

<h2>⚽ Informações do Time</h2>

<div id="team-info">

<h3>Clique em um time</h3>

</div>

</section>

<!-- ========================================= -->
<!-- ESTÁDIOS -->
<!-- ========================================= -->

<section id="estadios">

<h2>🏟️ Estádios</h2>

<div class="stadium-grid">

<div class="stadium">

<img src="https://images.unsplash.com/photo-1547347298-4074fc3086f0?q=80&w=1200">

<h3>Neo Arena</h3>

<p>📍 São Paulo</p>

<p>👥 80.000 pessoas</p>

<iframe
src="https://www.google.com/maps/embed?pb=!1m18"
loading="lazy">
</iframe>

</div>

<div class="stadium">

<img src="https://images.unsplash.com/photo-1517466787929-bc90951d0974?q=80&w=1200">

<h3>Future Stadium</h3>

<p>📍 Tóquio</p>

<p>👥 95.000 pessoas</p>

<iframe
src="https://www.google.com/maps/embed?pb=!1m18"
loading="lazy">
</iframe>

</div>

</div>

</section>

<!-- ========================================= -->
<!-- FIREBASE -->
<!-- ========================================= -->

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script src="script.js"></script>

</body>
</html>
